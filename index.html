// ACTUALIZAR CHARTS CON DATOS EN VIVO
function updateCharts(){
  if(charts.trend && charts.trend.data){
    const d=charts.trend.data.datasets;
    d[0].data=d[0].data.map(v=>Math.max(1,v+Math.round((Math.random()-.5)*3)));
    d[1].data=d[1].data.map(v=>Math.max(1,+(v+(Math.random()-.5)*1.5).toFixed(1)));
    d[2].data=d[2].data.map(v=>Math.max(1,v+Math.round((Math.random()-.5)*1)));
    charts.trend.update('none');
  }
}

/* ═══════════════════════════════════════
   GUÍA DE CONEXIÓN A APIs REALES
   ═══════════════════════════════════════

   1. LINKEDIN MARKETING API
      - Crear app en: https://www.linkedin.com/developers/
      - Permisos: r_organization_social, r_ads_reporting
      - Endpoint: GET https://api.linkedin.com/v2/organizationalEntityShareStatistics
      - Auth: OAuth 2.0 Bearer Token

   2. META GRAPH API (Facebook/Instagram)
      - Crear app en: https://developers.facebook.com/
      - Permisos: ads_read, read_insights, instagram_basic
      - Endpoint: GET https://graph.facebook.com/v19.0/{ad-account-id}/insights
      - Auth: Access Token de larga duración

   3. GOOGLE ANALYTICS 4 DATA API
      - Activar en: https://console.cloud.google.com/
      - Service Account + JSON key
      - Endpoint: POST https://analyticsdata.googleapis.com/v1beta/properties/{id}:runReport
      - Auth: Service Account OAuth2

   4. GOOGLE ADS API
      - Registrar en: https://ads.google.com/nav/selectaccount
      - Developer Token necesario
      - Usar Google Ads Query Language (GAQL)
      - Auth: OAuth2 + Developer Token

   Para arquitectura backend recomendada:
   - Node.js/Python server que consulta estas APIs
   - Caché Redis con TTL de 5-15 minutos
   - WebSockets para push de datos al cliente
   - Dashboard se suscribe via EventSource o WebSocket

*/
